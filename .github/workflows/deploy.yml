name: Build and Deploy

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [trigger-workflow]

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HASH_FILE: build_hash
  SOURCE_REPO: litkg3/Yohaku
  BUILD_COMMAND: pnpm --filter @yohaku/web build:ci

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.message != 'Update hash file' }}
    outputs:
      hash_content: ${{ steps.read.outputs.hash_content }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          echo "hash_content=$(cat ${{ env.HASH_FILE }} || true)" >> $GITHUB_OUTPUT

  check:
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.check.outputs.canceled }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - id: check
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          CURRENT=$(git rev-parse --short HEAD)
          echo "file=$FILE_HASH current=$CURRENT"
          if [ "$FILE_HASH" = "$CURRENT" ]; then
            echo "canceled=true" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.canceled != 'true' }}
    outputs:
      sha_short: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: pnpm install

      - name: Build
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GATEWAY_URL: ${{ vars.NEXT_PUBLIC_GATEWAY_URL }}
        run: |
          ${{ env.BUILD_COMMAND }}

          cd apps/web/.next

          rm -rf cache

          # 标准 standalone
          cp -r ../public ./standalone/public
          mv ./static ./standalone/apps/web/.next/static

          cd "$GITHUB_WORKSPACE"

          mkdir -p release
          cp -r apps/web/.next/standalone release/standalone

          # 写 pid 标识（不污染 server.js）
          echo "process.title='Yohaku'" >> release/standalone/server.js

          cd release
          zip --symlinks -r ../release.zip ./*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: release.zip

      - id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist

      - name: upload
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: "release.zip"
          target: "/tmp/yohaku"

      - name: deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            BASE=$HOME/yohaku
            RELEASES=$BASE/releases
            CURRENT=$BASE/current
            RUN=${{ github.run_number }}

            mkdir -p $RELEASES/$RUN

            unzip -q /tmp/yohaku/release.zip -d $RELEASES/$RUN

            ln -sfn $RELEASES/$RUN $CURRENT

            rm -rf /tmp/yohaku

            # .env 永远只挂 current
            ln -sf $BASE/.env $CURRENT/standalone/.env

            mkdir -p $BASE/.cache
            rm -rf $CURRENT/standalone/.next/cache
            ln -sfn $BASE/.cache $CURRENT/standalone/.next/cache

            cd $BASE

            if pm2 describe Yohaku >/dev/null 2>&1; then
              pm2 reload ecosystem.config.js --update-env
            else
              pm2 start ecosystem.config.js --update-env
            fi

            pm2 save
            echo "OK"

  store:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - uses: actions/checkout@v4
      - run: echo ${{ needs.build.outputs.sha_short }} > build_hash

      - run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add build_hash

          if git diff --cached --quiet; then
            echo "skip"
            exit 0
          fi

          git commit -m "Update hash file"

      - uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
