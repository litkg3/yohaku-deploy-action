name: Build and Deploy

on:
  push:
    branches:
      - main

  repository_dispatch:
    types: [trigger-workflow]

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HASH_FILE: build_hash
  SOURCE_REPO: litkg3/Yohaku
  BUILD_COMMAND: pnpm --filter @yohaku/web build:ci
  STANDALONE_SUBPATH: standalone

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.message != 'Update hash file' }}

    outputs:
      hash_content: ${{ steps.read_hash.outputs.hash_content }}

    steps:
      - uses: actions/checkout@v4

      - id: read_hash
        run: |
          content=$(cat ${{ env.HASH_FILE }} || true)
          echo "hash_content=$content" >> $GITHUB_OUTPUT

  check:
    runs-on: ubuntu-latest
    needs: prepare

    outputs:
      canceled: ${{ steps.use_content.outputs.canceled }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: litkg3/Yohaku
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - id: use_content
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          current_hash=$(git rev-parse --short HEAD)

          echo "File Hash: $FILE_HASH"
          echo "Current Hash: $current_hash"

          if [ "$FILE_HASH" = "$current_hash" ]; then
            echo "canceled=true" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.canceled != 'true' }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@v2

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GATEWAY_URL: ${{ vars.NEXT_PUBLIC_GATEWAY_URL }}
        run: |
          ${{ env.BUILD_COMMAND }}

          cd apps/web/.next

          rm -rf cache

          # ✅确保 public 正确进入 standalone
          cp -r ../public ./standalone/public

          # ❌关键修复：只打 standalone，不要 apps/web
          zip -qr release.zip standalone

          cd ../../

          mkdir -p ../../assets
          mv apps/web/.next/release.zip ../../assets/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: assets/release.zip

      - name: Store hash
        id: store
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Debug
        run: |
          ls -lah

      - name: Upload zip
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: "release.zip"
          target: "/tmp/yohaku"

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            basedir=$HOME/yohaku
            workdir=$basedir/${{ github.run_number }}

            mkdir -p $workdir

            mv /tmp/yohaku/release.zip $workdir/release.zip

            cd $workdir
            unzip -q release.zip

            # ✅安全处理 .env
            if [ -f $basedir/.env ]; then
              ln -sf $basedir/.env standalone/.env || true
            fi

            # ✅固定 server.js（避免 22/23 漂移）
            ln -sf $workdir/standalone/server.js $basedir/server.js || true

            # cache
            mkdir -p standalone/.next
            ln -sf $basedir/.cache standalone/.next/cache || true

            cd $basedir

            if pm2 describe Yohaku >/dev/null 2>&1; then
              pm2 reload Yohaku --update-env
            else
              pm2 start server.js --name Yohaku
            fi

            pm2 save
            echo "Deployed successfully"

  store:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Write hash
        run: echo ${{ needs.build.outputs.sha_short }} > ${{ env.HASH_FILE }}

      - name: Commit
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add ${{ env.HASH_FILE }}

          if git diff --cached --quiet; then
            echo "no change"
            exit 0
          fi

          git commit -m "Update hash file"

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
